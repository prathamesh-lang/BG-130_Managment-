<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCart | Create Account</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-layer-group"></i> <span>ForgeCart</span>
        </a>
    </nav>

    <div class="container auth-wrapper">
        <div class="glass auth-container">
            <h2>Initiate Access</h2>
            {% if error %}
            <div style="color: red; margin-bottom: 10px;">{{ error }}</div>
            {% endif %}
            <form action="/register.html" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" id="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" id="email" class="form-control" placeholder="developer@backforge.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Create a secure password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Verify password" required>
                </div>
                <button type="submit" class="btn btn-block" style="margin-top: 15px;">
                    <i class="fas fa-user-plus"></i> Initialize Account
                </button>
            </form>
            <p>Already registered? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <i class="fas fa-layer-group"></i> ForgeCart
                <span>· BackForge 2026</span>
            </div>
            <div class="footer-links">
                <a href="index.html">Store</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">Orders</a>
                <a href="login.html">Account</a>
            </div>
            <div class="footer-copy">
                Built for the BackForge Hackathon · Designed with precision
            </div>
        </div>
    </footer>
</body>
</html>
